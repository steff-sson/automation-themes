<!DOCTYPE html>
<html lang="de" data-theme="dark" class="bg-background text-text">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Automation{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/output.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    [data-theme="dark"] { --color-background: #001b2e; --color-surface: #0a2a3f; --color-surface-light: #133a52; --color-border: #1a4a6a; --color-text: #ffefd3; --color-text-muted: #8899aa; --color-accent: #ffc49b; }
    [data-theme="light"] { --color-background: #f8fafc; --color-surface: #ffffff; --color-surface-light: #f1f5f9; --color-border: #e2e8f0; --color-text: #0f172a; --color-text-muted: #64748b; --color-accent: #f97316; }
    .sidebar { width: 240px; transition: transform 0.2s ease; }
    .sidebar.collapsed { width: 64px; }
    .sidebar.collapsed .nav-label { display: none; }
    .sidebar.collapsed .sidebar-header-text { display: none; }
    .sidebar.collapsed .sidebar-footer-text { display: none; }
    .sidebar.collapsed .nav-item { justify-content: center; }
    .sidebar.collapsed .nav-item i { margin-right: 0; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 50; transform: translateX(-100%); width: 240px !important; }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: none; }
      .sidebar-overlay.open { display: block; }
      main { padding-top: 56px !important; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="flex min-h-screen bg-background text-text">

  <!-- Mobile Header -->
  <div class="md:hidden fixed top-0 left-0 right-0 z-30 bg-surface border-b border-border px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <i data-lucide="zap" class="w-5 h-5 text-accent"></i>
      <span class="text-sm font-medium">{% block mobile_header %}automation{% endblock %}</span>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="toggleTheme()" class="text-text-muted hover:text-text p-1 rounded">
        <i data-lucide="sun" class="w-4 h-4 theme-icon-light"></i>
        <i data-lucide="moon" class="w-4 h-4 theme-icon-dark"></i>
      </button>
      <button onclick="toggleSidebar()" class="text-text-muted hover:text-text p-1 rounded">
        <i data-lucide="menu" class="w-5 h-5"></i>
      </button>
    </div>
  </div>

  <!-- Mobile Overlay -->
  <div class="sidebar-overlay fixed inset-0 bg-black/50 z-40" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar bg-surface border-r border-border flex flex-col shrink-0 h-screen sticky top-0">
    <div class="flex items-center justify-between p-4 border-b border-border">
      <div class="flex items-center gap-2">
        <i data-lucide="zap" class="w-5 h-5 text-accent"></i>
        <span class="sidebar-header-text text-sm font-medium">{% block sidebar_header %}automation{% endblock %}</span>
      </div>
      <button onclick="toggleSidebar()" class="text-text-muted hover:text-text p-1 rounded">
        <i data-lucide="menu" class="w-4 h-4"></i>
      </button>
    </div>
    <nav class="flex flex-col gap-1 p-2 flex-1">
      {% block nav_items %}{% endblock %}
    </nav>
    <div class="p-4 border-t border-border">
      <button onclick="toggleTheme()" class="flex items-center justify-between w-full p-2 rounded hover:bg-surface-light transition-colors">
        <div class="flex items-center gap-2 text-text-muted text-sm">
          <i data-lucide="sun" class="w-4 h-4 theme-icon-light"></i>
          <i data-lucide="moon" class="w-4 h-4 theme-icon-dark"></i>
          <span class="sidebar-footer-text">Theme</span>
        </div>
        <div class="relative w-9 h-5 rounded-full bg-border transition-colors" id="theme-toggle-track">
          <div class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-accent transition-transform" id="theme-toggle-dot"></div>
        </div>
      </button>
      <div class="text-xs text-text-muted mt-2 sidebar-footer-text">{% block sidebar_footer %}{% endblock %}</div>
    </div>
  </aside>

  <!-- Content -->
  <main class="flex-1 p-6 overflow-y-auto">
    {% block content %}{% endblock %}
  </main>

  <script>
    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.sidebar-overlay');
      sidebar.classList.toggle('collapsed');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    }

    function closeSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.sidebar-overlay');
      if (window.innerWidth < 768) {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcons();
      updateTogglePosition();
    }

    function updateTogglePosition() {
      const theme = document.documentElement.getAttribute('data-theme');
      const dot = document.getElementById('theme-toggle-dot');
      if (dot) {
        dot.style.transform = theme === 'light' ? 'translateX(16px)' : 'translateX(0)';
      }
    }

    function updateThemeIcons() {
      const theme = document.documentElement.getAttribute('data-theme');
      document.querySelectorAll('.theme-icon-light').forEach(el => {
        el.style.display = theme === 'dark' ? 'block' : 'none';
      });
      document.querySelectorAll('.theme-icon-dark').forEach(el => {
        el.style.display = theme === 'light' ? 'block' : 'none';
      });
    }

    // Load saved theme
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcons();
    updateTogglePosition();

    // Init Lucide icons
    lucide.createIcons();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
